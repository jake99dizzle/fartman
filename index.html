<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>FART MAN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#111;overflow:hidden;touch-action:none;user-select:none;font-family:'Courier New',monospace;}
canvas{display:block;image-rendering:pixelated;}
#pw{display:none;position:fixed;inset:0;background:#1a0a2e;z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px;}
#pw .ri{font-size:70px;animation:sp 2s ease-in-out infinite alternate;}
#pw h2{font-size:26px;margin-top:16px;color:#ffe600;font-weight:900;}
#pw p{font-size:15px;margin-top:8px;color:#ccc;}
@keyframes sp{from{transform:rotate(-30deg)}to{transform:rotate(30deg)}}
@media(orientation:portrait){#pw{display:flex;}canvas{display:none;}#ui{display:none;}}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;opacity:0;transition:opacity 0.25s;}
.screen.active{opacity:1;}
.screen.hidden{display:none;}
#main-menu{background:radial-gradient(ellipse at center,#1a0533 0%,#060010 100%);}
.gt{font-size:clamp(50px,12vw,96px);color:#ffe600;text-shadow:5px 5px 0 #ff6b00,10px 10px 0 #8b0000;letter-spacing:6px;animation:tb 1.4s ease-in-out infinite alternate;line-height:1;font-weight:900;font-style:italic;font-family:'Courier New',monospace;}
@keyframes tb{from{transform:translateY(-8px) rotate(-2deg)}to{transform:translateY(8px) rotate(2deg)}}
.ts{font-size:clamp(9px,2vw,15px);color:#7dff6b;letter-spacing:5px;margin-top:6px;text-shadow:0 0 16px #7dff6b;font-weight:700;}
.cd{font-size:clamp(26px,5vw,44px);margin:10px 0;animation:fc 3s ease-in-out infinite alternate;}
@keyframes fc{from{transform:translateX(-10px)}to{transform:translateX(10px)}}
.btn{font-size:clamp(13px,2.8vw,20px);padding:12px 32px;border:4px solid #000;border-radius:0;cursor:pointer;margin:6px;font-weight:900;letter-spacing:3px;pointer-events:all;font-family:'Courier New',monospace;text-transform:uppercase;image-rendering:pixelated;position:relative;}
.btn::after{content:'';position:absolute;bottom:-6px;right:-6px;width:100%;height:100%;background:#000;z-index:-1;}
.btn:active{transform:translate(3px,3px);}
.btn:active::after{display:none;}
.btn-p{background:#ffe600;color:#000;border-color:#000;}
.btn-s{background:#7dff6b;color:#000;border-color:#000;}
.btn-d{background:#ff4444;color:#fff;border-color:#000;}
.btn-pu{background:#cc44ff;color:#fff;border-color:#000;}
.sbar{position:absolute;top:10px;right:12px;color:#ffe600;font-size:clamp(10px,1.8vw,15px);font-weight:900;display:flex;gap:12px;text-shadow:2px 2px 0 #000;font-family:'Courier New',monospace;}
.mute-btn{position:absolute;top:10px;left:12px;background:#333;border:3px solid #000;color:#fff;font-size:clamp(14px,2.5vw,20px);padding:4px 10px;cursor:pointer;pointer-events:all;font-family:'Courier New',monospace;border-radius:0;}
.mute-btn:active{transform:translate(2px,2px);}
#char-select{background:radial-gradient(ellipse at center,#0a2e1a 0%,#010a04 100%);}
#loc-select{background:radial-gradient(ellipse at center,#2e1a00 0%,#080300 100%);}
.stitle{font-size:clamp(16px,3.5vw,26px);color:#7dff6b;text-shadow:3px 3px 0 #000;margin-bottom:6px;font-weight:900;font-family:'Courier New',monospace;letter-spacing:3px;}
.stitle2{font-size:clamp(16px,3.5vw,26px);color:#ff9944;text-shadow:3px 3px 0 #000;margin-bottom:6px;font-weight:900;font-family:'Courier New',monospace;letter-spacing:3px;}
.cgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;width:90vw;max-width:680px;margin:5px 0;}
.ccard{background:#111;border:3px solid #444;padding:6px 3px;text-align:center;cursor:pointer;transition:all 0.1s;position:relative;}
.ccard.sel{border-color:#ffe600;background:#2a2000;}
.ccard.lk{opacity:0.4;cursor:not-allowed;}
.ccard.lk::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,0,0,0.6);}
.ccard canvas{display:block;margin:0 auto;image-rendering:pixelated;}
.cnm{font-size:clamp(5px,0.9vw,9px);color:#ccc;margin-top:2px;font-weight:700;line-height:1.2;font-family:'Courier New',monospace;}
.cul{font-size:clamp(5px,0.8vw,8px);color:#ff9944;margin-top:1px;font-family:'Courier New',monospace;}
.sinfo{color:#ffe600;font-size:clamp(12px,2.2vw,18px);margin:5px 0;font-weight:900;font-family:'Courier New',monospace;text-shadow:2px 2px 0 #000;}
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:90vw;max-width:680px;margin:6px 0;}
.lcard{background:#111;border:3px solid #444;padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.1s;position:relative;}
.lcard.sel{border-color:#ffe600;background:#2a2000;}
.lcard.lk{opacity:0.4;cursor:not-allowed;}
.lcard.lk::after{content:'🔒';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(0,0,0,0.6);}
.lem{font-size:clamp(24px,4vw,36px);display:block;}
.lnm{font-size:clamp(8px,1.3vw,12px);color:#fff;margin-top:3px;font-weight:900;font-family:'Courier New',monospace;}
.lul{font-size:clamp(6px,0.9vw,9px);color:#ff9944;margin-top:2px;font-family:'Courier New',monospace;}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);}
.hbtns{display:flex;flex-direction:row;gap:6px;pointer-events:all;}
.hcenter{flex:1;display:flex;justify-content:center;align-items:flex-start;padding-top:4px;}
.hright{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.hscore{font-size:clamp(16px,3vw,26px);color:#ffe600;text-shadow:2px 2px 0 #000;font-weight:900;font-family:'Courier New',monospace;display:flex;align-items:center;gap:4px;}
.hlives{display:flex;gap:4px;align-items:center;justify-content:flex-end;}
.heart{image-rendering:pixelated;}
.hpow{font-size:clamp(10px,1.7vw,14px);color:#ff44ff;font-weight:900;font-family:'Courier New',monospace;text-shadow:1px 1px 0 #000;}
#pbtn,#mbtn-game{position:static;background:#111;border:2px solid #888;padding:2px;display:block;}
#holdbtn{position:absolute;bottom:12px;right:12px;width:clamp(72px,13vw,100px);height:clamp(72px,13vw,100px);border-radius:50%;background:rgba(255,230,0,0.18);border:5px solid rgba(255,230,0,0.7);display:flex;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;animation:pb 1.8s ease-in-out infinite;}
#holdbtn.pr{background:rgba(125,255,107,0.4);border-color:#7dff6b;animation:none;}
@keyframes pb{0%,100%{box-shadow:0 0 8px rgba(255,230,0,0.3)}50%{box-shadow:0 0 25px rgba(255,230,0,0.8)}}
.hbinner{font-size:clamp(11px,2vw,15px);color:#ffe600;font-weight:900;font-family:'Courier New',monospace;text-align:center;line-height:1.2;}
#game-over{background:rgba(0,0,0,0.9);}
.gotitle{font-size:clamp(36px,8vw,66px);color:#ff4444;text-shadow:5px 5px 0 #000;font-weight:900;font-style:italic;animation:shk 0.5s ease-in-out;font-family:'Courier New',monospace;}
@keyframes shk{0%,100%{transform:rotate(0)}20%{transform:rotate(-5deg)}40%{transform:rotate(5deg)}60%{transform:rotate(-3deg)}80%{transform:rotate(3deg)}}
.gostats{font-size:clamp(12px,2.3vw,18px);color:#fff;text-align:center;margin:10px 0;line-height:2;font-weight:700;font-family:'Courier New',monospace;}
.gostats span{color:#ffe600;}
.unlock{font-size:clamp(10px,2vw,16px);color:#7dff6b;text-shadow:0 0 10px #7dff6b;text-align:center;margin:5px 0;min-height:20px;font-weight:900;font-family:'Courier New',monospace;}
.gobtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.pxbtn{cursor:pointer;pointer-events:all;image-rendering:pixelated;display:block;background:#222;border:3px solid #fff;padding:2px;}
.pxbtn:active{transform:translate(2px,2px);}
.btnicon{image-rendering:pixelated;vertical-align:middle;display:inline-block;}
.staticon{image-rendering:pixelated;vertical-align:middle;margin-right:3px;}
#pbtn,#mbtn-game{position:absolute;background:transparent;border:none;padding:0;top:8px;}
#pbtn{left:8px;}
#mbtn-game{left:46px;}
.mute-btn{position:absolute;top:10px;left:12px;background:transparent;border:none;padding:0;}
.pf{position:absolute;font-size:clamp(13px,2.3vw,20px);color:#ffe600;text-shadow:2px 2px 0 #000;pointer-events:none;animation:fu 1s ease-out forwards;white-space:nowrap;font-weight:900;font-family:'Courier New',monospace;}
@keyframes fu{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-52px) scale(1.3)}}

</style>
</head>
<body>
<div id="pw"><div class="ri"><canvas id="icon-rotate" width="60" height="60"></canvas></div><h2>ROTATE YOUR PHONE!</h2><p>Fart Man needs landscape to fly!</p></div>
<canvas id="gc"></canvas>
<div id="ui">

  <!-- MAIN MENU -->
  <div id="main-menu" class="screen active">
    <canvas id="mute-btn-menu" class="pxbtn" onclick="toggleMute();playUIFart()" width="32" height="32" title="Mute/Unmute"></canvas>
    <div class="sbar">
      <div><canvas class="staticon" id="icon-burrito-hud" width="16" height="16"></canvas><span id="mBur">0</span></div>
      <div><canvas class="staticon" id="icon-games" width="16" height="16"></canvas><span id="mGames">0</span></div>
      <div><canvas class="staticon" id="icon-trophy" width="16" height="16"></canvas><span id="mHS">0</span></div>
    </div>
    <div class="gt">FART MAN</div>
    <div class="ts">THE GASSIEST GAME ALIVE</div>
    <div class="cd"><canvas id="menu-clouds" width="160" height="44"></canvas></div>
    <div style="display:flex;flex-direction:column;align-items:center;margin-top:8px;">
      <button class="btn btn-p" onclick="goChar();playUIFart()"><canvas class="btnicon" id="icon-play" width="18" height="18"></canvas> PLAY</button>
      <button class="btn btn-s" onclick="howTo();playUIFart()"><canvas class="btnicon" id="icon-info" width="18" height="18"></canvas> HOW TO PLAY</button>
    </div>
  </div>

  <!-- CHAR SELECT -->
  <div id="char-select" class="screen hidden">
    <div class="stitle">► CHOOSE YOUR GASSER ◄</div>
    <div class="cgrid" id="cgrid"></div>
    <div class="sinfo" id="cinfo">Fart Man selected!</div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn btn-d" onclick="goMenu();playUIFart()"><canvas class="btnicon" id="icon-back1" width="14" height="14"></canvas> BACK</button>
      <button class="btn btn-p" onclick="goLoc();playUIFart()">NEXT <canvas class="btnicon" id="icon-next" width="14" height="14"></canvas></button>
    </div>
  </div>

  <!-- LOC SELECT -->
  <div id="loc-select" class="screen hidden">
    <div class="stitle2">► PICK YOUR BATTLEFIELD ◄</div>
    <div class="lgrid" id="lgrid"></div>
    <div style="display:flex;gap:10px;margin-top:6px;">
      <button class="btn btn-d" onclick="goChar();playUIFart()"><canvas class="btnicon" id="icon-back2" width="14" height="14"></canvas> BACK</button>
      <button class="btn btn-p" onclick="startGame();playUIFart()"><canvas class="btnicon" id="icon-fart" width="18" height="18"></canvas> GO!</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div class="hbtns">
      <canvas id="pbtn" class="pxbtn" onclick="togglePause();playUIFart()" width="32" height="32" title="Pause"></canvas>
      <canvas id="mbtn-game" class="pxbtn" onclick="toggleMute();playUIFart()" width="32" height="32" title="Mute/Unmute"></canvas>
    </div>
    <div class="hcenter">
      <div class="hpow" id="hpow"></div>
    </div>
    <div class="hright">
      <div class="hscore"><canvas class="staticon" id="icon-burrito-score" width="18" height="18"></canvas><span id="hsc">0</span></div>
      <div class="hlives" id="hlv"></div>
    </div>
  </div>

  <!-- HOLD BTN -->
  <div id="holdbtn" style="display:none;"
    ontouchstart="startF(event)" ontouchend="stopF(event)"
    onmousedown="startF(event)" onmouseup="stopF(event)">
    <div class="hbinner">HOLD<br><canvas id="icon-fart-btn" width="28" height="28"></canvas><br>FART</div>
  </div>



  <!-- GAME OVER -->
  <div id="game-over" class="screen hidden">
    <div class="gotitle">GAME OVER!</div>
    <div class="gostats">
      Burritos: <span id="goBur">0</span> | Best: <span id="goBest">0</span><br>
      Total Games: <span id="goGames">0</span>
    </div>
    <div class="unlock" id="ulk"></div>
    <div style="margin:6px 0;">
      <canvas id="mute-btn-go" class="pxbtn" onclick="toggleMute();playUIFart()" width="32" height="32" title="Mute/Unmute"></canvas>
    </div>
    <div class="gobtns">
      <button class="btn btn-p" onclick="restartGame();playUIFart()"><canvas class="btnicon" id="icon-replay" width="18" height="18"></canvas> PLAY AGAIN</button>
      <button class="btn btn-s" onclick="goMenu();playUIFart()"><canvas class="btnicon" id="icon-home" width="18" height="18"></canvas> MENU</button>
    </div>
  </div>

</div>

var fartAudioBuffer = null; // decoded WebAudio buffer

function loadFartAudio(){
  var ac = getAC(); if(!ac) return;
  // Try MP3 first, fallback to M4A
  var b64 = FART_MP3_B64;
  var mime = 'audio/mpeg';
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  ac.decodeAudioData(bytes.buffer, function(buf){
    fartAudioBuffer = buf;
  }, function(){
    // MP3 failed, try M4A
    var b64m = FART_M4A_B64;
    var binm = atob(b64m);
    var bytesm = new Uint8Array(binm.length);
    for(var i=0;i<binm.length;i++) bytesm[i]=binm.charCodeAt(i);
    ac.decodeAudioData(bytesm.buffer, function(buf){
      fartAudioBuffer = buf;
    }, function(e){ console.log('Audio decode failed', e); });
  });
}

function playUIFart(){
  try{
    var ac = getAC(); if(!ac) return;
    if(ac.state==='suspended'){ ac.resume(); }
    if(fartAudioBuffer){
      // Real recorded fart
      var src = ac.createBufferSource();
      var g = ac.createGain();
      src.buffer = fartAudioBuffer;
      src.connect(g); g.connect(ac.destination);
      g.gain.value = 1.0;
      src.start();
    } else {
      // Buffer still decoding — play synth and try to load
      loadFartAudio();
      playUIFartSynth();
    }
  }catch(e){ playUIFartSynth(); }
}

function playUIFartSynth(){
  // Fallback synthetic wet fart if audio not loaded yet
  try{
    var ac=getAC();if(!ac)return;
    var dur=0.9; var sr=ac.sampleRate;
    var len=Math.floor(sr*dur);
    var buf=ac.createBuffer(1,len,sr);
    var d=buf.getChannelData(0);
    for(var i=0;i<len;i++){
      var t=i/sr;
      var env=Math.pow(Math.max(0,1-(t/dur)),0.35)*(0.6+0.4*Math.abs(Math.sin(t*28+Math.sin(t*11)*3)));
      var f=68-t*12+Math.sin(t*14)*22+Math.sin(t*5)*10;
      var tone=Math.sin(2*Math.PI*f*t);
      var harm=Math.sin(2*Math.PI*f*2*t)*0.35+Math.sin(2*Math.PI*f*3*t)*0.15;
      var noise=(Math.random()*2-1)*0.4;
      d[i]=(tone*0.55+harm*0.25+noise*0.2)*env;
      if(d[i]>1)d[i]=1;if(d[i]<-1)d[i]=-1;
    }
    var dist=ac.createWaveShaper();
    var curve=new Float32Array(512);
    for(var k=0;k<512;k++){var x=(k*2)/512-1;curve[k]=x<0?-Math.pow(-x,0.6):Math.pow(x,0.6);}
    dist.curve=curve;
    var filt=ac.createBiquadFilter();
    filt.type='lowpass';filt.frequency.value=520;filt.Q.value=4;
    var g2=ac.createGain();
    var src2=ac.createBufferSource();
    src2.buffer=buf;
    src2.connect(dist);dist.connect(filt);filt.connect(g2);g2.connect(ac.destination);
    g2.gain.value=1.0;
    src2.start();
  }catch(e){}
}

function drawSprite(ctx, sprite, x, y, scale) {
  var rows = sprite.length;
  var cols = sprite[0].length;
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      var code = sprite[r][c];
      if (code === '.' || code === ' ') continue;
      var color = PAL[code];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
    }
  }
}

function midiToFreq(n){return 440*Math.pow(2,(n-69)/12);}

// ── MUSIC SCHEDULER ─────────────────────────────────────────────────────────
// Uses a single ScriptProcessor-free approach: pre-schedule notes in chunks
// Each "chunk" = 4 beats. We schedule 2 chunks ahead, refresh every 1 chunk.
// This eliminates the stuttering from setTimeout drift.

var musicTimer = null;
var musicStartTime = 0;
var musicBeat = 0;
var musicDef = null;
var musicMaster = null;
var musicChunkSize = 4; // beats per chunk

function startMusic(locId){
  if(SD.muted) return;
  stopMusic();
  var ac = getAC(); if(!ac) return;
  try{ if(ac.state==='suspended') ac.resume(); }catch(e){}

  musicDef = MUSIC_DEFS[locId] || MUSIC_DEFS[0];
  musicMaster = ac.createGain();
  musicMaster.gain.value = 0.42;
  musicMaster.connect(ac.destination);

  musicBeat = 0;
  musicStartTime = ac.currentTime + 0.05;
  musicPlaying = true;
  currentLocMusic = locId;

  // Schedule first 3 chunks immediately
  scheduleChunk(0);
  scheduleChunk(1);
  scheduleChunk(2);

  // Refresh scheduler every half-chunk duration
  var beatDur = 60 / musicDef.bpm;
  var halfChunk = (musicChunkSize * beatDur * 0.5) * 1000;
  musicTimer = setInterval(function(){
    if(!musicPlaying){ clearInterval(musicTimer); return; }
    var ac2 = getAC(); if(!ac2) return;
    var nowBeat = (ac2.currentTime - musicStartTime) / (60/musicDef.bpm);
    // Schedule chunks that are within 2 chunk-lengths of now
    var chunksAhead = 2;
    var nextChunk = Math.floor(nowBeat / musicChunkSize) + chunksAhead;
    scheduleChunk(nextChunk);
  }, halfChunk);
}

// Track which chunks have been scheduled to avoid double-scheduling
var scheduledChunks = {};

function scheduleChunk(chunkIdx){
  if(scheduledChunks[chunkIdx]) return;
  scheduledChunks[chunkIdx] = true;
  if(!musicPlaying || !musicDef || !musicMaster) return;
  var ac = getAC(); if(!ac) return;

  var def = musicDef;
  var beatDur = 60 / def.bpm;
  var chunkStart = musicStartTime + chunkIdx * musicChunkSize * beatDur;

  // Don't schedule past chunks
  if(chunkStart + musicChunkSize * beatDur < ac.currentTime - 0.1) return;

  // Which 16-step pattern position does this chunk start at?
  // Each chunk = 4 beats. Steps play at 1/2 beat each = 8 steps per chunk.
  var stepOffset = (chunkIdx * 8) % 16;
  var halfBeat = beatDur * 0.5;

  // ── BASS (sawtooth, filtered) ──
  for(var i=0;i<8;i++){
    var si = (stepOffset + i) % 16;
    var note = def.root + def.steps[si];
    var t = chunkStart + i * halfBeat;
    playNote(ac, musicMaster, note, t, halfBeat*0.82, 0.28, 'sawtooth', 'lowpass', 340, 2);
  }

  // ── CHORDS (square, staccato stabs) ──
  // Stab on beat 1 and beat 3 of the chunk
  var chordIdx = chunkIdx % def.chords.length;
  var nextChordIdx = (chunkIdx+1) % def.chords.length;
  [0, beatDur*2].forEach(function(offset, ci){
    var chord = ci===0 ? def.chords[chordIdx] : def.chords[nextChordIdx];
    chord.forEach(function(iv){
      var t = chunkStart + offset;
      playNote(ac, musicMaster, def.root+iv, t, beatDur*0.35, 0.055, 'square', 'lowpass', 900, 1);
    });
  });

  // ── MELODY (triangle, syncopated) ──
  for(var m=0;m<8;m++){
    var mi = (stepOffset + m) % 16;
    // Only play on some steps for syncopation
    if(m===0||m===2||m===3||m===5||m===7){
      var mnote = def.root + def.melody[mi];
      var mt = chunkStart + m * halfBeat;
      playNote(ac, musicMaster, mnote, mt, halfBeat*0.6, 0.04, 'triangle', 'bandpass', midiToFreq(def.root+def.melody[mi])*1.2, 2);
    }
  }

  // ── KICK (sine sweep down) ──
  // Beats 1 and 3 of chunk
  [0, beatDur*2].forEach(function(offset){
    var t = chunkStart + offset;
    playKick(ac, musicMaster, t);
  });

  // ── SNARE (noise burst) ──
  // Beats 2 and 4
  [beatDur, beatDur*3].forEach(function(offset){
    var t = chunkStart + offset;
    playNoise(ac, musicMaster, t, 0.09, 0.22, 'bandpass', 220);
  });

  // ── HI-HAT (noise, 8th notes) ──
  for(var h=0;h<8;h++){
    var ht = chunkStart + h * halfBeat;
    var hvol = (h%2===0) ? 0.07 : 0.04;
    playNoise(ac, musicMaster, ht, 0.032, hvol, 'highpass', 7000);
  }
}

function playNote(ac, dest, midi, t, dur, vol, type, filtType, filtFreq, filtQ){
  try{
    var osc = ac.createOscillator();
    var g = ac.createGain();
    var filt = ac.createBiquadFilter();
    filt.type = filtType||'lowpass';
    filt.frequency.value = filtFreq||800;
    filt.Q.value = filtQ||1;
    osc.type = type||'sine';
    osc.frequency.value = midiToFreq(midi);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol, t+0.008);
    g.gain.setValueAtTime(vol, t+dur*0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    osc.connect(filt); filt.connect(g); g.connect(dest);
    osc.start(t); osc.stop(t+dur+0.01);
    musicNodes.push(osc);
  }catch(e){}
}

function playKick(ac, dest, t){
  try{
    var osc = ac.createOscillator();
    var g = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(35, t+0.1);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.15);
    osc.connect(g); g.connect(dest);
    osc.start(t); osc.stop(t+0.18);
    musicNodes.push(osc);
  }catch(e){}
}

function playNoise(ac, dest, t, dur, vol, filtType, filtFreq){
  try{
    var len = Math.max(1, Math.floor(ac.sampleRate * dur));
    var buf = ac.createBuffer(1, len, ac.sampleRate);
    var d = buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i] = Math.random()*2-1;
    var src = ac.createBufferSource();
    var g = ac.createGain();
    var filt = ac.createBiquadFilter();
    filt.type = filtType||'highpass';
    filt.frequency.value = filtFreq||8000;
    src.buffer = buf;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    src.connect(filt); filt.connect(g); g.connect(dest);
    src.start(t);
    musicNodes.push(src);
  }catch(e){}
}

function stopMusic(){
  musicPlaying = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer=null; }
  scheduledChunks = {};
  musicNodes.forEach(function(n){ try{ n.stop(); }catch(e){} });
  musicNodes = [];
  musicMaster = null;
}


// SFX
// (duplicate playUIFart removed)

function playFartSFX(){
  try{
    var ac=getAC();if(!ac)return;
    var buf=ac.createBuffer(1,ac.sampleRate*0.22,ac.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++){
      var t=i/ac.sampleRate;
      var f=85+Math.sin(t*30)*22*(1-t*4.5);
      d[i]=Math.sin(2*Math.PI*f*t)*(1-t*4.5)*(Math.random()*0.3+0.7);
      if(d[i]>1)d[i]=1;if(d[i]<-1)d[i]=-1;
    }
    var src=ac.createBufferSource();var g=ac.createGain();
    src.buffer=buf;src.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(0.28,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.22);
    src.start();
  }catch(e){}
}

function playDingSFX(){
  try{
    var ac=getAC();if(!ac)return;
    var o=ac.createOscillator();var g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.setValueAtTime(880,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320,ac.currentTime+0.07);
    g.gain.setValueAtTime(0.2,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
    o.start();o.stop(ac.currentTime+0.1);
  }catch(e){}
}

function playSplatSFX(){
  try{
    var ac=getAC();if(!ac)return;
    var buf=ac.createBuffer(1,ac.sampleRate*0.15,ac.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*0.8;
    var src=ac.createBufferSource();var g=ac.createGain();var f=ac.createBiquadFilter();
    f.type='lowpass';f.frequency.value=300;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination);
    g.gain.setValueAtTime(0.4,ac.currentTime);src.start();
  }catch(e){}
}

function playPowSFX(){
  try{
    var ac=getAC();if(!ac)return;
    [523,659,784,1046].forEach(function(fr,i){
      var o=ac.createOscillator();var g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=fr;
      var t=ac.currentTime+i*0.08;
      g.gain.setValueAtTime(0.15,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      o.start(t);o.stop(t+0.12);
    });
  }catch(e){}
}

function drawPixelSkull(cx, cy, sz){
  // 7x8 pixel skull grid
  var g=[
    '0111110',
    '1111111',
    '1010101',
    '1111111',
    '0111110',
    '0100010',
    '0111110',
    '0010100',
  ];
  var ps=Math.max(1,Math.floor(sz/7));
  var ox=Math.round(cx-g[0].length*ps/2);
  var oy=Math.round(cy-g.length*ps/2);
  ctx.fillStyle='rgba(0,0,0,0.85)';
  for(var r=0;r<g.length;r++){
    for(var c=0;c<g[r].length;c++){
      if(g[r][c]==='1') ctx.fillRect(ox+c*ps,oy+r*ps,ps,ps);
    }
  }
}

function drawToxicCloud(o){
  ctx.save();
  var r=o.radius;
  var pulse=0.5+Math.sin(fc*0.11)*0.5;
  // Pulsing red danger ring
  ctx.beginPath();ctx.arc(o.x,o.y,r+3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,30,60,'+pulse*0.5+')';ctx.fill();
  // Green toxic wisp body — multiple overlapping blobs for cloud look
  var offsets=[{dx:0,dy:0,s:1},{dx:-r*0.3,dy:-r*0.2,s:0.7},{dx:r*0.3,dy:-r*0.15,s:0.65},{dx:0,dy:r*0.25,s:0.6}];
  offsets.forEach(function(off){
    var grad=ctx.createRadialGradient(o.x+off.dx,o.y+off.dy,0,o.x+off.dx,o.y+off.dy,r*off.s);
    grad.addColorStop(0,'rgba(120,240,60,0.82)');
    grad.addColorStop(0.6,'rgba(70,190,30,0.45)');
    grad.addColorStop(1,'rgba(30,100,10,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(o.x+off.dx,o.y+off.dy,r*off.s,0,Math.PI*2);ctx.fill();
  });
  // Pixel skull centred in cloud
  var skullSz=Math.max(6,Math.floor(r*1.1));
  drawPixelSkull(o.x, o.y, skullSz);
  ctx.restore();
}

function drawBurrito(b){
  ctx.save();
  var wobble=Math.sin(b.wb+fc*0.09)*3;
  // Force burrito to be wide and short — classic horizontal wrap shape
  var bx=Math.round(b.x);
  var by=Math.round(b.y+wobble);
  var bw=38; // fixed wide width
  var bh=18; // fixed short height — elongated horizontal shape
  var cx=bx+bw/2, cy=by+bh/2;
  var rx=bw/2, ry=bh/2;

  // 1. Dark shadow (offset down-right)
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx+2,cy+2,rx,ry,0,0,Math.PI*2);
  ctx.fill();

  // 2. Main tortilla body — warm tan
  ctx.fillStyle='#c8963e';
  ctx.beginPath();
  ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  ctx.fill();

  // 3. Lighter top highlight
  ctx.fillStyle='#e0b060';
  ctx.beginPath();
  ctx.ellipse(cx,cy-2,rx-4,ry-4,0,0,Math.PI*2);
  ctx.fill();

  // 4. Horizontal wrap crease lines
  ctx.strokeStyle='#9a6b20';
  ctx.lineWidth=1.2;
  [-4,-1,2,5].forEach(function(dy){
    var half=Math.sqrt(Math.max(0,rx*rx*(1-(dy*dy)/(ry*ry))))*0.88;
    ctx.beginPath();
    ctx.moveTo(cx-half, cy+dy);
    ctx.lineTo(cx+half, cy+dy);
    ctx.stroke();
  });

  // 5. Left crimped end — darker brown oval
  ctx.fillStyle='#7a4010';
  ctx.beginPath();
  ctx.ellipse(bx+5, cy, 6, ry-1, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#a05818';
  ctx.beginPath();
  ctx.ellipse(bx+5, cy-1, 3, ry-4, 0, 0, Math.PI*2);
  ctx.fill();

  // 6. Right crimped end
  ctx.fillStyle='#7a4010';
  ctx.beginPath();
  ctx.ellipse(bx+bw-5, cy, 6, ry-1, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#a05818';
  ctx.beginPath();
  ctx.ellipse(bx+bw-5, cy-1, 3, ry-4, 0, 0, Math.PI*2);
  ctx.fill();

  // 7. Filling peek in centre — red beans + yellow cheese strip
  ctx.fillStyle='#c03010';
  ctx.fillRect(cx-7, cy-3, 14, 6);
  ctx.fillStyle='#f5cc20';
  ctx.fillRect(cx-5, cy-1, 10, 3);
  ctx.fillStyle='#3a9a20';
  ctx.fillRect(cx-7, cy+1, 4, 2); // green bit (guac/pepper)

  // 8. Outer outline
  ctx.strokeStyle='#5a2e00';
  ctx.lineWidth=1.8;
  ctx.beginPath();
  ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  ctx.stroke();

  ctx.restore();
}

function drawPowerup(p){
  ctx.save();
  var wobble=Math.sin(p.wb+fc*0.1)*4;
  if(p.type==='rainbow'){
    drawSprite(ctx,RAINBOW_SPRITE,p.x,p.y+wobble,Math.floor(p.w/10));
  }else{
    drawSprite(ctx,DOUBLE_SPRITE,p.x,p.y+wobble,Math.floor(p.w/7));
  }
  ctx.restore();
}

function drawPlayer(){
  var sp=SPRITES[SD.selChar];
  if(!sp)return;
  ctx.save();
  if(flashT>0&&Math.floor(flashT/5)%2===0)ctx.globalAlpha=0.4;
  // Rainbow invincibility — flashing rainbow outline around player
  if(rainbowT>0){
    var hue=fc*8%360;
    ctx.strokeStyle='hsl('+hue+',100%,60%)';
    ctx.lineWidth=4;
    ctx.strokeRect(PL.x-4,PL.y-4,PL.w+8,PL.h+8);
    // Second outline offset for thickness
    ctx.strokeStyle='hsl('+(hue+120)%360+',100%,70%)';
    ctx.lineWidth=2;
    ctx.strokeRect(PL.x-7,PL.y-7,PL.w+14,PL.h+14);
  }
  ctx.translate(PL.x+PL.w/2,PL.y+PL.h/2);
  var tilt=Math.max(-0.35,Math.min(0.35,PL.vy*0.035));
  ctx.rotate(tilt);
  drawSprite(ctx,sp,-PL.w/2,-PL.h/2,sprScale);
  ctx.restore();
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════
function fartCloud(x,y){
  var rb = rainbowT>0;
  var cx = x - 2;
  var cy = y + PL.h * 0.62;

  // Jet core — tight fast stream
  for(var i=0;i<4;i++){
    var speed = 4.5 + Math.random()*3;
    var spread = (Math.random()-0.5)*1.2;
    parts.push({
      x:cx, y:cy + spread*4,
      vx:-speed, vy:spread,
      r:Math.random()*5+3, life:1, dec:0.055,
      rb:rb, hue:(fc*14+i*55)%360,
      jet:true, jcol:rb?null:('rgba('+(100+Math.floor(Math.random()*80))+',220,'+(50+Math.floor(Math.random()*80))+',')
    });
  }

  // Outer puff cloud — larger slower
  for(var j=0;j<3;j++){
    parts.push({
      x:cx - Math.random()*8, y:cy + (Math.random()-0.5)*12,
      vx:-(Math.random()*1.8+0.5), vy:(Math.random()-0.5)*1.2,
      r:Math.random()*11+7, life:0.85, dec:Math.random()*0.02+0.012,
      rb:rb, hue:(fc*10+j*70)%360,
      g:Math.floor(160+Math.random()*60), b:Math.floor(40+Math.random()*60)
    });
  }
}

function drawJetEffect(){
  // Draw a persistent glowing nozzle at fart origin when boosting
  if(!farting) return;
  var cx = PL.x - 4;
  var cy = PL.y + PL.h * 0.62;
  ctx.save();
  // Cone shape pointing left
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx - 22, cy - 9);
  ctx.lineTo(cx - 38, cy);
  ctx.lineTo(cx - 22, cy + 9);
  ctx.closePath();
  var grad = ctx.createLinearGradient(cx, cy, cx-38, cy);
  if(rainbowT>0){
    grad.addColorStop(0,'hsla('+(fc*10%360)+',100%,70%,0.9)');
    grad.addColorStop(0.4,'hsla('+(fc*10%360+120)+',100%,60%,0.5)');
    grad.addColorStop(1,'rgba(255,255,255,0)');
  } else {
    grad.addColorStop(0,'rgba(160,255,80,0.95)');
    grad.addColorStop(0.35,'rgba(80,220,40,0.55)');
    grad.addColorStop(1,'rgba(40,180,20,0)');
  }
  ctx.fillStyle = grad;
  ctx.fill();

  // Bright nozzle flash
  ctx.beginPath();
  ctx.arc(cx, cy, 5+Math.sin(fc*0.5)*2, 0, Math.PI*2);
  ctx.fillStyle = rainbowT>0 ? 'hsla('+(fc*12%360)+',100%,80%,0.9)' : 'rgba(200,255,100,0.9)';
  ctx.fill();
  ctx.restore();
}

function burst(x,y,count,col){
  for(var i=0;i<count;i++){
    var a=(Math.PI*2*i)/count;
    parts.push({x:x,y:y,vx:Math.cos(a)*(Math.random()*4+2),vy:Math.sin(a)*(Math.random()*4+2),
      r:Math.random()*5+3,life:1,dec:0.04,burst:true,bcol:col||'rgba(255,80,80,'});
  }
}

// ═══════════════════════════════════════════
// SPAWN
// ═══════════════════════════════════════════
function spawnObs(){
  // Early game: walls only. Lasers appear after fc>600
  var maxType = fc<600 ? 1 : 3;
  var t=Math.floor(Math.random()*maxType);
  var x=canvas.width+20;
  if(t===0){// Wall — bottom section only, player flies OVER top
    var wallH=Math.floor((FLOOR-CEIL)*(0.25+Math.min(fc/10000,0.30)));
    var wallY=FLOOR-wallH; // wall sits on the floor, extends upward
    obs.push({type:'wall',x:x,topH:0,gapY:wallY,gapH:wallH,w:38,bottomOnly:true});
  }else if(t===1){// Laser — thinner early on
    var lh=fc<1200?6:9;
    var ly=CEIL+50+Math.random()*(FLOOR-CEIL-100);
    obs.push({type:'laser',x:x,y:ly,w:Math.min(180,100+Math.floor(fc/200)*5),h:lh});
  }
}

function spawnEnemy(){
  var t=Math.floor(Math.random()*3);
  var x=canvas.width+30;
  if(t===0){// Toilet - straight
    var ey=CEIL+30+Math.random()*(FLOOR-CEIL-80);
    enemies.push({type:'toilet',x:x,y:ey,w:48,h:44,vx:-(spd+1.5)});
  }else if(t===1){// Plunger - spinning drift
    var py=CEIL+40+Math.random()*(FLOOR-CEIL-90);
    enemies.push({type:'plunger',x:x,y:py,w:34,h:44,vx:-(spd+0.8),vy:(Math.random()-0.5)*3,angle:0,spin:0.1+Math.random()*0.15});
  }else{// Toxic cloud - slow, grows
    var cy=CEIL+50+Math.random()*(FLOOR-CEIL-100);
    enemies.push({type:'cloud',x:x,y:cy,radius:10,maxR:28,vx:-(spd*0.65),vy:(Math.random()-0.5)*1.0,growRate:0.04});
  }
}

function spawnBurrito(){
  var y=CEIL+30+Math.random()*(FLOOR-CEIL-60);
  burritos.push({x:canvas.width+8,y:y,w:32,h:28,wb:Math.random()*Math.PI*2});
}

function spawnPup(){
  var y=CEIL+40+Math.random()*(FLOOR-CEIL-80);
  pups.push({x:canvas.width+8,y:y,type:'rainbow',w:36,h:36,wb:Math.random()*Math.PI*2});
}

// ═══════════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════════
function clamp(a,b,c){return Math.max(a,Math.min(c,b));}

function overlap(ax,ay,aw,ah,bx,by,bw,bh,pad){
  pad=pad||5;
  return ax+pad<bx+bw-pad&&ax+aw-pad>bx+pad&&ay+pad<by+bh-pad&&ay+ah-pad>by+pad;
}

function circleRect(cx,cy,cr,rx,ry,rw,rh){
  var nearX=Math.max(rx,Math.min(cx,rx+rw));
  var nearY=Math.max(ry,Math.min(cy,ry+rh));
  var dx=cx-nearX,dy=cy-nearY;
  return dx*dx+dy*dy<cr*cr;
}

function hitObs(o){
  var px=PL.x,py=PL.y,pw=PL.w,ph=PL.h;
  if(o.type==='laser'){
    if(overlap(px,py,pw,ph,o.x,o.y,o.w,o.h,4))return true;
  }
  return false;
}

function hitEnemy(e){
  var px=PL.x+PL.w/2,py=PL.y+PL.h/2;
  if(e.type==='cloud'){
    var dx=px-e.x,dy=py-e.y;
    return dx*dx+dy*dy<(e.radius+4)*(e.radius+4);
  }
  return overlap(PL.x,PL.y,PL.w,PL.h,e.x,e.y,e.w,e.h,5);
}

// ═══════════════════════════════════════════
// HIT / END
// ═══════════════════════════════════════════
function takeHit(){
  if(rainbowT>0||graceT>0)return;
  playSplatSFX();
  lives--;
  flashT=40; graceT=120;
  burst(PL.x+PL.w/2,PL.y+PL.h/2,12,'rgba(255,50,50,');
  // Respawn at starting position — 22% from left, vertically centred
  PL.x = Math.floor(canvas.width*0.22);
  PL.y = Math.floor((FLOOR-CEIL)/2)+CEIL-Math.floor(PL.h/2);
  PL.vy = 0;
  updateHUD();
  if(lives<=0)endGame();
}

function endGame(){
  GS='gameover';farting=false;
  stopMusic();
  document.getElementById('holdbtn').classList.remove('pr');
  SD.totalGames++;SD.totalBurritos+=score;
  var oldHighScore=SD.highScore; // capture BEFORE updating
  var oldTotalGames=SD.totalGames-1; // games before this run
  if(score>SD.highScore)SD.highScore=score;
  saveSave();
  document.getElementById('hud').style.display='none';
  document.getElementById('holdbtn').style.display='none';
  document.getElementById('goBur').textContent=score;
  document.getElementById('goBest').textContent=SD.highScore;
  document.getElementById('goGames').textContent=SD.totalGames;
  var msg='';
  // Only show unlock if player JUST crossed the threshold this run
  CHARS.forEach(function(c){
    if(c.unlock>0 && oldHighScore<c.unlock && SD.highScore>=c.unlock)
      msg+=c.name+' UNLOCKED! ';
  });
  LOCS.forEach(function(l){
    if(l.unlockG>0 && oldTotalGames<l.unlockG && SD.totalGames>=l.unlockG)
      msg+=l.name+' UNLOCKED! ';
  });
  document.getElementById('ulk').textContent=msg;
  showScreen('game-over');
  updateMuteBtns();
}

function drawPixelHeart(ctx2, x, y, sz, filled){
  // 7x6 pixel heart grid
  var grid=[
    '0110100110',
    '1111111111',
    '1111111111',
    '0111111110',
    '0011111100',
    '0001111000',
    '0000110000',
  ];
  var ps=Math.max(1,Math.floor(sz/7));
  var col=filled?'#ff2244':'#555';
  var hi=filled?'#ff6677':'#777';
  ctx2.save();
  for(var r=0;r<grid.length;r++){
    for(var c2=0;c2<grid[r].length;c2++){
      if(grid[r][c2]==='1'){
        ctx2.fillStyle=(r===0&&c2>1&&c2<4)||r===0?hi:col;
        ctx2.fillRect(x+c2*ps, y+r*ps, ps, ps);
      }
    }
  }
  ctx2.restore();
}

function updateHUD(){
  document.getElementById('hsc').textContent=score;
  var hc=document.getElementById('hlv');hc.innerHTML='';
  for(var i=0;i<3;i++){
    var hs=Math.floor(clamp(16,2.6*canvas.width/100,24));
    var h=document.createElement('canvas');
    h.width=hs+4; h.height=hs+4; h.className='heart';
    h.style.imageRendering='pixelated';
    drawPixelHeart(h.getContext('2d'), 0, 0, hs, i<lives);
    hc.appendChild(h);
  }
  var pt='';
  if(rainbowT>0)pt='** INVINCIBLE '+Math.ceil(rainbowT/60)+'s **';
  document.getElementById('hpow').textContent=pt;
}

function startGame(){
  GS='playing';
  showScreen('');

  updatePauseBtn(false);
  updateBounds();
  sprScale=Math.floor(clamp(2,canvas.height/120,4));
  PL.w=16*sprScale;PL.h=15*sprScale;
  score=0;lives=3;farting=false;spd=3;fc=0;
  rainbowT=0;flashT=0;graceT=0;fartPuff=0;stuckTimer=0;boostTimer=0;
  obs=[];burritos=[];pups=[];parts=[];bgObjs=[];enemies=[];
  PL.x=Math.floor(canvas.width*0.22);PL.y=FLOOR-PL.h;PL.vy=0;

  }
  loop();

function restartGame(){startGame();}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function loop(){
  if(GS!=='playing'){loopId=null;return;}
  loopId=requestAnimationFrame(loop);
  fc++;
  updateBounds();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  spd=1.8+Math.min(fc/2200,4.2); // starts slow, ramps over ~5min

  // Player physics
  if(farting){
    if(PL.vy>-7.5)PL.vy-=1.52;
    fartPuff++;
    if(fartPuff%4===0)fartCloud(PL.x,PL.y);
    if(fartPuff%16===0)playFartSFX();
  }else{fartPuff=0;}
  PL.vy+=0.44;
  PL.y+=PL.vy;
  if(PL.y+PL.h>=FLOOR){PL.y=FLOOR-PL.h;PL.vy=0;}
  if(PL.y<=CEIL){PL.y=CEIL;PL.vy=2;}

  // Bottom-wall-only top surface landing handled inside obstacle loop below
  var onWallTop=false;

  // Off-screen left = lose a life + respawn centre-left
  if(PL.x+PL.w < 0 && graceT<=0){
    playSplatSFX();
    lives--;
    flashT=45; graceT=120;
    PL.x = Math.floor(canvas.width*0.22);
    PL.y = Math.floor((FLOOR-CEIL)/2)+CEIL-PL.h/2;
    PL.vy = 0;
    burst(PL.x+PL.w/2, PL.y+PL.h/2, 12, 'rgba(255,80,0,');
    updateHUD();
    if(lives<=0){ endGame(); return; }
  }

  // Timers
  if(flashT>0)flashT--;
  if(graceT>0)graceT--;
  if(rainbowT>0)rainbowT--;
  updateHUD();

  // Spawn — starts sparse, gets denser over time
  // Obstacle interval: starts at 280 frames (~4.5s), tightens to 90
  var si=Math.max(90, 280-Math.floor(fc/180)*8);
  if(fc>60 && fc%si===0) spawnObs();
  // Burritos: start at 90, tighten to 45
  var bi=Math.max(45, 90-Math.floor(fc/600)*5);
  if(fc%bi===0) spawnBurrito();
  // Power-up: very rare ~1/4 as often — every 1800-1200 frames
  var pi=Math.max(1200, 1800-Math.floor(fc/500)*30);
  if(fc>300 && fc%pi===0) spawnPup();
  // Enemies: don't appear until fc>400, interval 350->150
  var ei=Math.max(150, 350-Math.floor(fc/300)*15);
  if(fc>400 && fc%ei===0) spawnEnemy();
  // BG decor
  if(fc%100===0) spawnBgObj();
  // No obstacles at all for first 3 seconds
  if(fc<180){ obs=[]; enemies=[]; }

  var frz=false;// Rainbow = invincibility, not freeze

  // BG objs
  bgObjs.forEach(function(o){o.x-=o.spd;});
  bgObjs=bgObjs.filter(function(o){return o.x+200>0;});

  // Boost forward after wall hit — rocket player past wall
  if(boostTimer>0){
    boostTimer--;
    PL.x+=spd*3.5;
  }

  // Obstacles — walls BLOCK (never kill), lasers kill
  var pinnedThisFrame=false;
  var prevPLX=PL.x;
  obs.forEach(function(o){
    o.x-=spd;
    if(o.type==='wall'){
      // Rainbow fart or boost = pass through walls completely
      if(boostTimer>0||rainbowT>0) return;
      // Bottom-only wall: open above gapY, solid from gapY to FLOOR
      if(rainbowT>0||boostTimer>0) return; // pass through during power-up/boost

      var wallTop = o.gapY;
      var wallLeft = o.x;
      var wallRight = o.x + o.w;
      var playerBottom = PL.y + PL.h;
      var playerRight2 = PL.x + PL.w;

      // Player is fully above the wall — no collision at all
      if(playerBottom <= wallTop) return;

      // Player horizontally overlaps with wall
      var horizOverlap = playerRight2 > wallLeft+2 && PL.x < wallRight-2;

      if(horizOverlap){
        // Check if player is landing on top from above
        // Must be: previously above wall (playerBottom - PL.vy was above wallTop)
        var prevBottom = playerBottom - PL.vy;
        var landingOnTop = prevBottom <= wallTop + 2 && PL.vy >= 0;

        if(landingOnTop){
          // Land on wall top — snap feet to surface
          PL.y = wallTop - PL.h;
          PL.vy = 0;
          // Don't set pinned — player is on top, not blocked
          return;
        }

        // Player is inside the wall body — side collision from left
        // Only block if player came from the left (not already past wall)
        var approachingFromLeft = PL.x < wallLeft + o.w - 4;
        if(approachingFromLeft && playerBottom > wallTop + 4){
          PL.x = wallLeft - PL.w;
          PL.vy *= 0.85;
          pinnedThisFrame = true;
        }
      }
    } else {
      // Lasers and other obs: kill on touch
      if(graceT<=0&&rainbowT<=0&&hitObs(o))takeHit();
    }
  });
  obs=obs.filter(function(o){return o.x+200>0;});

  // Stuck detection: player must be TRULY stuck (X hasn't moved)
  // and must have been pinned for a full second before losing a life
  if(pinnedThisFrame && graceT<=0 && rainbowT<=0 && boostTimer<=0){
    // Only count as stuck if player X is genuinely frozen
    // (i.e. the wall is holding them back, they can't move forward)
    if(Math.abs(PL.x - prevPLX) < 1){
      stuckTimer++;
    }
    // Visual warning: flash player gently after half a second
    if(stuckTimer===30) flashT=10;
    // After ~1.2s genuinely stuck: lose a life, boost forward
    if(stuckTimer>=72){
      stuckTimer=0;
      boostTimer=25;
      playSplatSFX();
      lives--;
      flashT=40; graceT=120;
      burst(PL.x+PL.w, PL.y+PL.h/2, 12, 'rgba(255,120,0,');
      updateHUD();
      if(lives<=0){ endGame(); return; }
    }
  } else {
    // Not pinned this frame — always reset immediately
    stuckTimer=0;
  }

  // Enemies
  enemies.forEach(function(e){
    e.x+=e.vx;
    if(e.type==='plunger'){
      e.y+=e.vy;e.angle+=e.spin;
      if(e.y<CEIL+10||e.y+e.h>FLOOR-10)e.vy*=-1;
    }else if(e.type==='cloud'){
      e.y+=e.vy;
      if(e.y-e.radius<CEIL+5||e.y+e.radius>FLOOR-5)e.vy*=-1;
      if(e.radius<e.maxR)e.radius+=e.growRate;
    }
    if(graceT<=0&&rainbowT<=0&&hitEnemy(e))takeHit();
  });
  enemies=enemies.filter(function(e){return e.x+200>0;});

  // Burritos
  burritos.forEach(function(b){
    b.x-=spd;
    b.wb+=0.05;
    if(overlap(PL.x,PL.y,PL.w,PL.h,b.x,b.y,b.w,b.h,3)){
      score++;playDingSFX();
      flashMsg('+1 BURRITO!',b.x,b.y-10);
      burst(b.x+b.w/2,b.y+b.h/2,6,'rgba(0,255,100,');
      b.done=true;
    }
  });
  burritos=burritos.filter(function(b){return !b.done&&b.x+50>0;});

  // Powerups
  pups.forEach(function(p){
    p.x-=spd;
    p.wb+=0.07;
    if(overlap(PL.x,PL.y,PL.w,PL.h,p.x,p.y,p.w,p.h,3)){
      playPowSFX();
      flashMsg('** RAINBOW FART! INVINCIBLE! **',p.x,p.y-18);
      burst(p.x+p.w/2,p.y+p.h/2,12,'rgba(200,100,255,');
      rainbowT=360;
      p.done=true;
    }
  });
  pups=pups.filter(function(p){return !p.done&&p.x+50>0;});

  // Particles
  parts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;p.vx*=0.95;p.vy*=0.95;});
  parts=parts.filter(function(p){return p.life>0;});

  // ── DRAW ──
  drawBG();

  // Particles behind
  parts.forEach(function(p){
    ctx.beginPath();
    var rad = p.jet ? p.r*p.life*1.2 : p.r*p.life;
    ctx.arc(p.x,p.y,Math.max(0.5,rad),0,Math.PI*2);
    if(p.rb) ctx.fillStyle='hsla('+p.hue+',100%,65%,'+p.life+')';
    else if(p.burst) ctx.fillStyle=p.bcol+p.life+')';
    else if(p.jet) ctx.fillStyle=p.jcol+p.life+')';
    else ctx.fillStyle='rgba(130,'+(p.g||180)+','+(p.b||80)+','+p.life+')';
    ctx.fill();
  });

  // Draw obstacles
  obs.forEach(function(o){
    if(o.type==='wall')drawWall(o);
    else drawLaser(o);
  });

  // Draw enemies
  enemies.forEach(function(e){
    if(e.type==='toilet')drawToilet(e);
    else if(e.type==='plunger')drawPlunger(e);
    else drawToxicCloud(e);
  });

  // Draw burritos
  burritos.forEach(function(b){drawBurrito(b);});

  // Draw powerups
  pups.forEach(function(p){drawPowerup(p);});

  // Draw player
  drawJetEffect();
  drawPlayer();

  // Rainbow invincibility overlay
  if(rainbowT>0){
    ctx.fillStyle='hsla('+(fc*7%360)+',100%,60%,0.04)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // Distance
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.font='bold 13px Courier New';ctx.textAlign='left';
  ctx.fillText(Math.floor(fc/60)+'m',14,canvas.height-8);
}

// ═══════════════════════════════════════════
// PIXEL ICON DRAWING
// ═══════════════════════════════════════════
function px(ctx, x, y, col){ ctx.fillStyle=col; ctx.fillRect(x,y,1,1); }

function drawIconPause(c){
  var x=c.getContext('2d'); x.clearRect(0,0,32,32);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#222'; x.fillRect(0,0,32,32);
  x.fillStyle='#ffe600';
  x.fillRect(8,8,5,16); x.fillRect(19,8,5,16);
  x.fillStyle='#fff';
  x.fillRect(7,7,7,2); x.fillRect(18,7,7,2);
}
function drawIconPlay(c){
  var x=c.getContext('2d'); x.clearRect(0,0,32,32);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#222'; x.fillRect(0,0,32,32);
  x.fillStyle='#ffe600';
  for(var r=0;r<16;r++){
    var w=Math.floor(r/2)+1;
    if(r<8) x.fillRect(8,8+r,w*2,1);
    else x.fillRect(8,8+r,(16-r)*2,1);
  }
}
function drawIconSpeaker(c, muted){
  var x=c.getContext('2d'); x.clearRect(0,0,32,32);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#222'; x.fillRect(0,0,32,32);
  x.fillStyle='#ffe600';
  // Speaker box
  x.fillRect(6,11,6,10);
  // Cone
  x.fillRect(12,8,2,3); x.fillRect(14,6,2,4); x.fillRect(16,4,2,5);
  x.fillRect(12,21,2,3); x.fillRect(14,22,2,4); x.fillRect(16,23,2,5);
  if(!muted){
    // Sound waves
    x.fillStyle='#7dff6b';
    x.fillRect(20,10,2,12);
    x.fillRect(23,8,2,16);
  } else {
    // X cross
    x.fillStyle='#ff4444';
    x.fillRect(20,10,2,2); x.fillRect(22,12,2,2); x.fillRect(24,14,2,2);
    x.fillRect(24,10,2,2); x.fillRect(22,12,2,2); x.fillRect(20,14,2,2);
    x.fillRect(20,10,2,2); x.fillRect(24,14,2,2);
    for(var d=0;d<5;d++){ x.fillRect(20+d*1,10+d*1,2,2); x.fillRect(24-d*1,10+d*1,2,2); }
  }
}
function drawIconArrowLeft(c){
  var x=c.getContext('2d'); x.clearRect(0,0,14,14);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#fff';
  for(var r=0;r<7;r++){
    x.fillRect(6-r,r,r+1,1);
    x.fillRect(6-r,13-r,r+1,1);
  }
  x.fillRect(6,0,1,14);
}
function drawIconArrowRight(c){
  var x=c.getContext('2d'); x.clearRect(0,0,14,14);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#fff';
  for(var r=0;r<7;r++){
    x.fillRect(7,r,r+1,1);
    x.fillRect(7,13-r,r+1,1);
  }
  x.fillRect(7,0,1,14);
}
function drawIconFartSmall(c, w, h){
  var x=c.getContext('2d'); x.clearRect(0,0,w,h);
  x.imageSmoothingEnabled=false;
  // Mini fart cloud
  x.fillStyle='#88dd44';
  x.fillRect(4,6,10,6); x.fillRect(6,4,6,10); x.fillRect(3,8,12,2);
  x.fillStyle='#ccff88';
  x.fillRect(6,6,6,4); x.fillRect(7,5,4,6);
  x.fillStyle='#44bb22';
  x.fillRect(4,10,2,2); x.fillRect(12,6,2,2);
}
function drawIconInfo(c){
  var x=c.getContext('2d'); x.clearRect(0,0,18,18);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#fff';
  x.fillRect(8,3,2,2);
  x.fillRect(7,7,4,1); x.fillRect(8,7,2,7); x.fillRect(7,14,4,1);
}
function drawIconHome(c){
  var x=c.getContext('2d'); x.clearRect(0,0,18,18);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#fff';
  // Roof
  for(var r=0;r<6;r++) x.fillRect(9-r,6-r,r*2,1);
  x.fillRect(3,12,12,1);
  // Walls
  x.fillRect(3,12,2,6); x.fillRect(13,12,2,6);
  // Door
  x.fillRect(7,14,4,4);
}
function drawIconReplay(c){
  var x=c.getContext('2d'); x.clearRect(0,0,18,18);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#fff';
  // Circular arrow
  x.fillRect(8,2,4,2); x.fillRect(12,4,2,4); x.fillRect(10,8,4,2);
  x.fillRect(4,4,2,4); x.fillRect(4,8,2,4); x.fillRect(4,12,6,2);
  x.fillRect(10,12,4,2); x.fillRect(14,8,2,4);
  // Arrow tip
  x.fillRect(6,2,2,2); x.fillRect(8,0,4,2); x.fillRect(10,2,2,2);
}
function drawIconBurritoSmall(c, sz){
  var x=c.getContext('2d'); x.clearRect(0,0,sz,sz);
  x.imageSmoothingEnabled=false;
  var s=Math.floor(sz/8);
  x.fillStyle='#ddbb77'; x.fillRect(s,s*2,sz-s*2,sz-s*4);
  x.fillStyle='#aa3311'; x.fillRect(s*2,s*3,sz-s*4,s);
  x.fillStyle='#ffee44'; x.fillRect(s*2,s*4,sz-s*4,s);
  x.fillStyle='#884422'; x.fillRect(0,s*3,s,s*2); x.fillRect(sz-s,s*3,s,s*2);
}
function drawIconTrophy(c){
  var x=c.getContext('2d'); x.clearRect(0,0,16,16);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#ffe600';
  x.fillRect(4,2,8,6); x.fillRect(5,8,6,2);
  x.fillRect(2,2,2,4); x.fillRect(12,2,2,4);
  x.fillRect(6,10,4,2); x.fillRect(4,12,8,2);
}
function drawIconGamepad(c){
  var x=c.getContext('2d'); x.clearRect(0,0,16,16);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#7dff6b';
  x.fillRect(2,5,12,6); x.fillRect(1,6,14,4);
  x.fillStyle='#000';
  x.fillRect(4,7,2,2); x.fillRect(5,6,2,2); // dpad
  x.fillRect(10,7,2,2); x.fillRect(12,7,2,2); // buttons
}
function drawMenuClouds(c){
  var x=c.getContext('2d'); x.clearRect(0,0,120,40);
  x.imageSmoothingEnabled=false;
  // Draw 3 pixel art fart clouds
  var clouds=[[8,20],[44,14],[82,20]];
  clouds.forEach(function(cl,i){
    var cx=cl[0],cy=cl[1];
    // Cloud puff body
    x.fillStyle='#88dd44';
    x.fillRect(cx+2,cy-6,12,12);
    x.fillRect(cx,cy-4,16,8);
    x.fillRect(cx+4,cy-8,8,4);
    // Highlight
    x.fillStyle='#ccff88';
    x.fillRect(cx+4,cy-6,4,4);
    x.fillRect(cx+2,cy-4,4,4);
    // Dark outline dots
    x.fillStyle='#44bb22';
    x.fillRect(cx,cy-4,2,2);
    x.fillRect(cx+14,cy-4,2,2);
    x.fillRect(cx+4,cy-8,2,2);
    // Pixel wind lines shooting left
    x.fillStyle='#66cc33';
    x.fillRect(cx-8,cy-2,6,2);
    x.fillRect(cx-10,cy+2,8,2);
    x.fillRect(cx-6,cy+6,5,2);
    // Wavy tail pixels
    x.fillStyle='#88dd44';
    x.fillRect(cx-14,cy-2,4,2);
    x.fillRect(cx-16,cy+2,4,2);
  });
}
function drawRotateIcon(c){
  var x=c.getContext('2d'); x.clearRect(0,0,60,60);
  x.imageSmoothingEnabled=false;
  x.fillStyle='#ffe600';
  // Phone outline
  x.fillRect(15,8,20,36); x.fillStyle='#000'; x.fillRect(17,10,16,30);
  x.fillStyle='#ffe600'; x.fillRect(20,40,8,2);
  // Arrow indicating rotation
  x.fillStyle='#7dff6b';
  x.fillRect(38,20,4,16); x.fillRect(30,28,8,4);
  x.fillRect(38,16,4,4); x.fillRect(42,20,4,4);
}

function drawAllIcons(){
  var c;
  // Pause/play icons
  c=document.getElementById('pbtn'); if(c) drawIconPause(c);
  // Speaker icons
  ['mute-btn-menu','mbtn-game','mute-btn-go'].forEach(function(id){
    c=document.getElementById(id); if(c) drawIconSpeaker(c, SD.muted);
  });
  // Arrow icons
  c=document.getElementById('icon-back1'); if(c) drawIconArrowLeft(c);
  c=document.getElementById('icon-back2'); if(c) drawIconArrowLeft(c);
  c=document.getElementById('icon-next'); if(c) drawIconArrowRight(c);
  // Fart icons
  c=document.getElementById('icon-fart'); if(c) drawIconFartSmall(c,18,18);
  c=document.getElementById('icon-fart-btn'); if(c) drawIconFartSmall(c,28,28);
  c=document.getElementById('icon-replay'); if(c) drawIconReplay(c);
  // Play
  c=document.getElementById('icon-play'); if(c) drawIconPlay(c);
  // Info
  c=document.getElementById('icon-info'); if(c) drawIconInfo(c);
  // Home
  c=document.getElementById('icon-home'); if(c) drawIconHome(c);
  // HUD stats
  c=document.getElementById('icon-burrito-hud'); if(c) drawIconBurritoSmall(c,16);
  c=document.getElementById('icon-burrito-score'); if(c) drawIconBurritoSmall(c,18);
  c=document.getElementById('icon-games'); if(c) drawIconGamepad(c);
  c=document.getElementById('icon-trophy'); if(c) drawIconTrophy(c);
  // Menu clouds
  c=document.getElementById('menu-clouds'); if(c) drawMenuClouds(c);
  // Rotate icon
  c=document.getElementById('icon-rotate'); if(c) drawRotateIcon(c);
}

function updateMuteBtns(){
  ['mute-btn-menu','mbtn-game','mute-btn-go'].forEach(function(id){
    var c=document.getElementById(id); if(c) drawIconSpeaker(c, SD.muted);
  });
}

function updatePauseBtn(paused){
  var c=document.getElementById('pbtn');
  if(!c) return;
  if(paused) drawIconPlay(c); else drawIconPause(c);
}

// BOOT
// ═══════════════════════════════════════════
// Music can't start until first user gesture (browser rule)
// Listen for first tap/click anywhere and start menu music then
var musicBooted=false;
function bootMusicOnFirstInteraction(){
  if(musicBooted) return;
  musicBooted=true;
  try{ var ac=getAC(); if(ac&&ac.state==='suspended') ac.resume(); }catch(e){}
  loadFartAudio(); // preload real fart audio buffer
  if(currentLocMusic!==0){ stopMusic(); currentLocMusic=0; startMusic(0); }
  document.removeEventListener('touchstart',bootMusicOnFirstInteraction);
  document.removeEventListener('mousedown',bootMusicOnFirstInteraction);
}
document.addEventListener('touchstart',bootMusicOnFirstInteraction,{passive:true});
document.addEventListener('mousedown',bootMusicOnFirstInteraction);

goMenu();
drawAllIcons();
// Try to preload fart audio immediately (works on some browsers)
// Will definitely load after first interaction via bootMusicOnFirstInteraction
try{ loadFartAudio(); }catch(e){}
</script>
